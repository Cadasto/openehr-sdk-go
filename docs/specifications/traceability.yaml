  - id: REQ-068
    title: SMART flows and launch modes
    canonical: docs/specifications/auth.md#req-068--flow-and-launch-mode-coverage
    status: draft
    implementation: landed
    packages: [auth/clientcreds, auth/jwtbearer, auth/smart]
    plans: [docs/plans/archive/2026-06-16-auth-smart-conformance-audit.md]
    probes: [PROBE-004, PROBE-005]
    notes: >
      Phase 3a (F-I): ClaimsSigner now signs via go-jose/v4. Default alg changed
      from RS256 to RS384 (SMART client-confidential-asymmetric SHALL). RS384 and
      ES384 are fully supported; RS256 and ES256 retained for back-compat. Key/alg
      mismatch rejected at construction (ErrInvalidConfig). Opaque crypto.Signer
      implementations (KMS/HSM) are supported for both RSA and ECDSA via
      go-jose/v4 cryptosigner.Opaque (no concrete-key requirement).
      Phase 3b (F-C): auth/smart authorization-code exchange can now authenticate
      with private_key_jwt via WithClientAssertionKey, reusing jwtbearer.ClaimsSigner
      (client_assertion + jwt-bearer assertion type, no HTTP Basic). Method selection
      is deterministic; assertion-key and client-secret are mutually exclusive.
      G-3: when the server advertises token_endpoint_auth_methods_supported, the
      configured method is cross-checked at construction (ErrInvalidConfig on absence).
      Phase 3c (F-C): auth/clientcreds now supports SMART Backend Services asymmetric
      client auth via WithClientAssertion(jwtbearer.AssertionSource). Wire shape:
      grant_type=client_credentials + client_assertion_type=jwt-bearer + signed
      client_assertion; no HTTP Basic, no client_secret. ClientSecret and
      ClientAssertion are mutually exclusive (ErrInvalidConfig if both set); secret
      is optional when assertion source is provided. Signing errors surfaced as
      ErrTokenExchangeFailed. Distinct from auth/jwtbearer (which is the JWT Bearer
      Token Grant, not client auth).
      Phase 3d/3e close-out: the RS384/ES384 asymmetric baseline (client-auth signing,
      F-I/F-C; G-3 method selection) and id_token verification alg agility (F-M, see
      REQ-062/REQ-064) have all landed.
      Phase 5 (F-E): the four SMART grant flows (PKCE public, confidential symmetric
      client_secret, confidential asymmetric private_key_jwt, client-credentials/backend
      + jwt-bearer) and all three launch modes (standalone, embedded/EHR-launch, backend)
      are now exercised in Sandbox by the auth probe suite (PROBE-001..009) plus the
      launch-mode coverage in testkit/probes/auth/launch_modes.go. REQ-068 flips to
      landed on this Sandbox coverage (same posture as the other landed auth REQs).
      Recorded follow-ups: Cassette/Live ratification against a reference authorization
      server is deferred; the backend launch-mode coverage exercises the RS384 default
      only (an ES* client-assertion arm is a possible follow-up). See the Inferno
      STU2.2 Client-suite cross-check in conformance.md.
    tests:
      - auth/jwtbearer/jwtbearer_test.go
      - auth/smart/smart_test.go
      - auth/clientcreds/clientcreds_test.go
      - testkit/probes/auth/probes_test.go

