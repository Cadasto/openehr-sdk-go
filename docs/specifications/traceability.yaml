  - id: REQ-062
    title: JWKS rotation
    canonical: docs/specifications/auth.md#req-062--jwks-rotation
    status: draft
    implementation: landed
    packages: [auth/smart, smart/discovery, auth/introspect]
    plans: [docs/plans/archive/2026-06-16-auth-smart-conformance-audit.md]
    adrs: [docs/adr/0009-smart-auth-library-scope.md]
    probes: [PROBE-006]
    notes: >
      alg allowlists (token_endpoint_auth_signing_alg_values_supported,
      id_token_signing_alg_values_supported) and introspection_endpoint are
      surfaced onto AuthEndpoints. introspection_endpoint is consumed by the opt-in
      RFC 7662 client auth/introspect, and token_endpoint_auth_methods_supported by
      auth/smart.FromConfig (G-3 cross-check); only
      token_endpoint_auth_signing_alg_values_supported remains surface-only.
      Phase 3e (F-M): id_token verification gained algorithm agility — smart.ValidateIDToken
      now verifies via github.com/coreos/go-oidc/v3 (go-jose) supporting RS256/RS384/ES256/ES384,
      constrained to the server's id_token_signing_alg_values_supported when supplied
      (smart.WithIDTokenSigningAlgs); rejects alg:none and unlisted algs as
      ErrJWKSValidationFailed. JWK->crypto.PublicKey via go-jose JSONWebKey (RSA+ECDSA).
      Hand-rolled RSA verify and rsaPublicKeyFromJWK removed. SDK's stricter claim
      semantics (claimsFromMap: iss/aud/exp/nbf/iat with 30s skew + nonce) preserved
      after signature verification.
      Phase 5b (F-J): opt-in RFC 7662 token introspection client landed in
      auth/introspect — resource-server / MCP-gateway scope, not wired into the
      default client path. Implements introspect.New (endpoint + injected
      *http.Client) and (*Client).Introspect (form-POST per RFC 7662 §2.1,
      active:false is success not error, non-2xx wrapped as ExchangeError).
    fixtures:
      - testkit/cassettes/its_rest/discovery/smart-configuration.json
    tests:
      - auth/smart/smart_test.go
      - smart/discovery/resolver_test.go
      - smart/idtoken_test.go
      - testkit/probes/auth/probes_test.go
      - auth/introspect/introspect_test.go

  - id: REQ-063
    title: Token refresh
    canonical: docs/specifications/auth.md#req-063--token-refresh
    status: draft
    implementation: landed
    packages: [auth, auth/smart, transport]
    plans: [docs/plans/archive/2026-06-16-auth-smart-conformance-audit.md]
    adrs: [docs/adr/0009-smart-auth-library-scope.md]
    probes: [PROBE-007]
    notes: >
      Phase 4a+4b landed. Phase 4a: ExchangeError.Terminal(), F-L
      refresh-token clearing (clear only on invalid_grant/invalid_client 4xx),
      RefreshIfNeeded, Reauther interface, ReautherFunc adapter, Reauth on
      *smart.Source. Phase 4b: transport.WithReauthOn401 opt-in 401→reauth
      safety net — wire 401 triggers Reauth once, retries once with refreshed
      bearer; second 401 surfaces ErrUnauthorized; no-reauther path unchanged.
      PROBE-007 passes in Sandbox for BOTH halves: the transport-401 safety
      net (probe_007_transport_refresh.go) and, as of Phase 5, the proactive
      expiry-based refresh on the wire (probe_007_proactive_refresh.go drives
      Source.Token over an expired token and asserts the token endpoint
      receives exactly one grant_type=refresh_token exchange). Full
      cassette/live ratification deferred.
    tests:
      - auth/errors_test.go
      - auth/smart/smart_test.go
      - transport/client_test.go
      - testkit/probes/auth/probes_test.go

