# golangci-lint v2 — keep in sync with LINT_IMAGE in the Makefile (v2.11.4)
# and the go-coding plugin reference (references/golangci.v2.yml).
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard          # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    # go-coding plugin reference set
    - modernize              # range-int, min/max, slices/maps, strings.Cut … (go fix engine)
    - errorlint              # %w + errors.Is/As discipline
    - bodyclose              # unclosed http.Response.Body
    - rowserrcheck           # unchecked sql.Rows.Err
    - sqlclosecheck          # unclosed sql.Rows/Stmt
    - noctx                  # HTTP/SQL issued without a context
    - contextcheck           # context not propagated through the call chain
    - containedctx           # context.Context stored in a struct field
    - perfsprint             # fmt.Sprintf where a cheaper call exists
    - revive                 # curated rule set — see linters.settings.revive
                             # (exported doc coverage, redefines-builtin-id,
                             # error-naming). var-naming is a non-issue: the
                             # underscore-named BMM schema types are generated
                             # (excluded by `generated: lax`).
    # repo additions retained on top of the reference set
    - copyloopvar
    - misspell
    - unconvert
  disable:
    - depguard               # no third-party deps yet; enable when the module grows
  settings:
    revive:
      # Curated high-signal set. Listing rules explicitly keeps the policy
      # predictable (rather than tracking revive's shifting defaults).
      rules:
        # Doc comments on exported symbols — the long-deferred gap. Stutter
        # check OFF: ehr.EHRID / discovery.DiscoveryError / walk.WalkSubtree
        # are deliberate, stable public API (idiom.md § public-API stability).
        - name: exported
          arguments:
            - disableStutteringCheck
        # Shadowing builtins (max, copy, …).
        - name: redefines-builtin-id
        # Sentinels named ErrXxx; the one deliberate exception
        # (walk.SkipSubtree, mirroring filepath.SkipDir) carries //nolint:revive.
        - name: error-naming
        # Too noisy for httptest handler (w, r) signatures and interface
        # implementations; renaming to _ hurts readability.
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax           # skip bmmgen output (// Code generated … DO NOT EDIT.)

formatters:
  enable:
    - gofumpt                # stricter gofmt superset
    - goimports              # import grouping + formatting
  exclusions:
    generated: lax
